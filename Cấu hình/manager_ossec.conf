<!-- Đoạn code cấu hình tích hợp VirusTotal -->
<ossec_config> 
  <integration>
  <name>virustotal</name>
  <api_key>c6c8443577d4acb6898206e1eb78c9670c8c082a87431b187801acf748ebb1f4   </api_key> 
  <group>syscheck</group> 
  <alert_format>json</alert_format>
  </integration>
</ossec_config>

<!-- Tự động block IP khi phát hiện brute-force -->
<active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>5712,5758,2502,5710,5760</rules_id>
    <timeout>600</timeout>  <!-- Block 10 phút -->
</active-response>

<!-- Tự động block khi VT phát hiện malware -->
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>87105</rules_id>
    <timeout>3600</timeout>  <!-- Block 1 giờ -->
  </active-response
